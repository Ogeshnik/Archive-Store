{{define "product.html"}}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{.Brand}} - {{.Model}}</title>
    <style>

        body {
            
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: hwb(72 60% 38% / 0.801);;
            margin: 0;
            padding: 50px;
            color: hwb(72 60% 38% / 0.801);;
        }
        
        .container {
            display: flex; /* Делаем две колонки как на скрине */
            max-width: 1200px;
            margin: 0 auto;
            gap: 60px;
        }
        .left-col { flex: 1.5; }
        .right-col { flex: 1; position: sticky; top: 50px; }
        
        img { width: 100%; height: auto; }
        
        .brand { font-size: 14px; text-transform: uppercase; font-weight: 600; margin-bottom: 5px; }
        .model { font-size: 24px; font-weight: 400; margin-bottom: 20px; }
        .price { font-size: 22px; font-weight: 600; margin-bottom: 30px; }
        
        /* КНОПКИ КАК У SPIN4SPIN */
        .buy-btn {
            
            background: hwb(72 60% 38% / 0.801);; color: #848584; border: none; width: 100%;
            padding: 15px; font-size: 14px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; margin-bottom: 10px;

  
        }
        .sub-btn {
            background: #000000; color: #616161; border: 1px solid #000; width: 100%;
            padding: 12px; font-size: 12px; cursor: pointer;
            text-transform: uppercase; margin-bottom: 8px;
        }
        .description { font-size: 14px; line-height: 1.6; color: #444; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<script>
(function() {
    // 1. Функция обновления цифр
    function updateVisuals() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const countElem = document.getElementById('cart-count');
        if (countElem) {
            countElem.innerText = cart.length;
        }
    }

    // 2. Функция анимации
    window.showTerminalNotif = function(id) {
        const notif = document.getElementById('terminal-notif');
        if (notif) {
            notif.innerText = `> Товар ${id} В корзине...`;
            notif.style.opacity = "1";
            notif.style.visibility = "visible";
            notif.style.transform = "translateY(-10px)";
            
            setTimeout(() => {
                notif.style.opacity = "0";
                notif.style.visibility = "hidden";
                notif.style.transform = "translateY(0)";
            }, 2500);
        }
    };

    // 3. Главная функция (делаем её глобальной)
    window.addToCart = function(id) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.push(id);
        localStorage.setItem('cart', JSON.stringify(cart));
        
        updateVisuals();
        window.showTerminalNotif(id);
        console.log(`[SYSTEM]: ID ${id} SAVED`);
    };

    // Запуск при загрузке
    document.addEventListener('DOMContentLoaded', updateVisuals);
})();
</script>


<body>

    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid #222; margin-bottom: 40px;">
    <a href="/" style="color: #636363; text-decoration: none; font-size: 12px; letter-spacing: 2px; font-weight: bold;">← BACK TO ARCHIVE</a>
    
    <div style="display: flex; gap: 25px;">
        <a href="/" style="color: #ffffff; text-decoration: none; font-size: 11px; letter-spacing: 1px;">PROTOTYPES</a>
        <a href="/rick" style="color: #fff; text-decoration: none; font-size: 11px; letter-spacing: 1px;">RICK OWENS</a>
        <a href="/numbernine" style="color: #fff; text-decoration: none; font-size: 11px; letter-spacing: 1px;">NUMBER (N)INE</a>
    </div>
</nav>
    <div class="container">
        <div class="left-col">
            <img src="/img/{{.Image}}" alt="{{.Model}}">
        </div>
        <div class="right-col" style="border: 1px solid #292929; box-shadow: 0 0 20px #333333; padding: 30px; display: flex; flex-direction: column; gap: 10px;">
    
    <!-- ИНФОРМАЦИЯ (Верхняя полка) -->
    <div style="margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 15px;">
        <div class="brand" style="color: rgb(0, 0, 0); font-size: 14px; letter-spacing: 2px;">{{.Brand}}</div>
        <div class="model" style="color: #000000; font-size: 20px; margin-top: 5px;">{{.Model}} ({{.Year}})</div>
        <div class="price" style="color: #000000; font-size: 22px; margin-top: 10px; font-weight: bold;">{{.Price}} ₽</div>
    </div>

    <!-- КНОПКИ (Нижняя полка) -->
    <div style="display: flex; flex-direction: column; gap: 12px;">
        <button onclick="addToCart('{{.ID}}')" class="buy-btn" style="border: 1px solid #000; background: #fff; color: #000; padding: 15px; font-weight: bold; cursor: pointer; width: 100%;">В КОРЗИНУ</button>
        <button class="sub-btn" style="border: 1px solid #ffffff; background: none; color: #000000; padding: 10px; cursor: pointer;">ПРЕДЛОЖИТЬ СВОЮ ЦЕНУ</button>
        <button class="sub-btn" style="border: 1px solid #ffffff; background: none; color: #000000; padding: 10px; cursor: pointer;">ЗАДАТЬ ВОПРОС</button>
        <button class="sub-btn" style="border: 1px solid #ffffff; background: none; color: #000000; padding: 10px; cursor: pointer;">ПРОДАТЬ ПОХОЖЕЕ</button>
    </div>
    <!-- ОПИСАНИЕ -->
    <div class="description" style="margin-top: 20px; color: #888; font-size: 13px; line-height: 1.5;">
        {{.Description}}
    </div>
</div>
            </div>
        </div>
    </div>

<div style="margin-bottom: 5px; font-size: 0.8em;"> </div>


<div class="archive-counter" style="position: fixed; top: 20px; right: 20px; z-index: 9999;">
    <a href="/cart" style="background: #636363; color: #fff; border: 1px solid #fff; padding: 10px 20px; text-decoration: none; font-family: monospace; display: block;">
        КОРЗИНА [<span id="cart-count">0</span>]
    </a>
    <!-- Выпадающий список при наведении -->
    <div id="cart-dropdown" style="display: none; position: absolute; top: 100%; right: 0; background: #000; border: 1px solid #fff; width: 200px; padding: 10px; font-family: monospace; color: #fff; font-size: 10px;">
        <div id="dropdown-items">ПУСТО...</div>
    </div>
</div>  

<style>
    .archive-counter:hover #cart-dropdown { display: block; }
</style>
<div id="terminal-notif" style="position: fixed; bottom: 30px; right: 30px; color: white; background: black; padding: 10px; border: 1px solid #333; z-index: 10000; font-family: monospace; display: block; opacity: 0; transition: all 0.5s;"></div>

</body>
</html>
{{end}}
