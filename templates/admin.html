<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: monospace;
            padding: 50px;
            margin: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-size: 12px;
            color: #999;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: #0a0a0a;
            border: 1px solid #333;
            color: #fff;
            font-family: monospace;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            border-color: #666;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #000;
            border: none;
            font-family: monospace;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background: #ccc;
        }

        .nav {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #333;
            display: flex;
            gap: 20px;
        }

        a {
            color: #fff;
            text-decoration: none;
            border-bottom: 1px dashed #666;
            flex: 1;
        }

        a:hover {
            border-bottom-style: solid;
        }

        .logout {
            background: #ff6b6b;
            color: #000;
            padding: 10px;
            text-align: center;
            text-decoration: none !important;
            border: none !important;
            font-weight: bold;
        }

        .logout:hover {
            background: #ff5252;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>[ ADMIN PANEL ]</h1>

    <form method="POST" action="/admin/add">
        <div class="form-group">
            <label>Бренд / Brand:</label>
            <input type="text" name="brand" required placeholder="Rick Owens">
        </div>

        <div class="form-group">
            <label>Модель / Model:</label>
            <input type="text" name="model" required placeholder="DRKSHDW Cargo">
        </div>

        <div class="form-group">
            <label>Цена / Price (₽):</label>
            <input type="number" name="price" required placeholder="15000">
        </div>

        <div class="form-group">
            <label>Год / Year:</label>
            <input type="number" name="year" required placeholder="2024">
        </div>

        <div class="form-group">
            <label>Категория / Category:</label>
            <select name="category" required>
                <option value="">-- Выберите --</option>
                <option value="prototypes">Prototypes</option>
                <option value="nine">Number (N)ine</option>
                <option value="rick">Rick Owens</option>
                <option value="starbucks">Haunted Starbucks</option>
                <option value="mihara">Mihara</option>
                <option value="saint">Saint Michael</option>
                <option value="soloist">Soloist</option>
            </select>
        </div>

        <div class="form-group">
            <label>Изображение / Image (имя файла):</label>
            <input type="text" name="image" required placeholder="saint8.avif">
        </div>

        <button type="submit">ДОБАВИТЬ ТОВАР</button>
    </form>

    <div class="nav">
        <a href="/">← На главную</a>
        <a href="/admin/logout" class="logout">ВЫХОД</a>
    </div>
</div>

</body>
</html>
