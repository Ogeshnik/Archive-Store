<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ARCHIVE | SHOP</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; margin: 0; padding: 50px 20px; }
        
        .nav-bar { display: flex; justify-content: center; gap: 30px; margin-bottom: 50px; border-bottom: 1px solid #222; padding-bottom: 20px; flex-wrap: nowrap; white-space: nowrap; overflow-x: auto; }
        .nav-btn { color: #636363; text-decoration: none; text-transform: uppercase; font-size: 12px; transition: 0.3s; }
        .nav-btn:hover { color: #fff; }

        .stack { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }

        .case-item { 
            width: 250px; text-align: center; display: flex; flex-direction: column; align-items: center; 
            padding: 20px; border: 1px solid #222; background: #0a0a0a; transition: 0.3s;
        }
        .case-item:hover { border-color: #555; }

        .image-container { width: 100%; height: 250px; overflow: hidden; margin-bottom: 15px; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.5s; }
        .case-item:hover img { filter: grayscale(0%); }

        .item-name { text-transform: uppercase; letter-spacing: 1px; margin: 10px 0; font-size: 13px; }
        .item-price { color: #fff; font-weight: bold; margin-bottom: 15px; }

        .buy-btn {
            width: 100%; background-color: #ffffff; color: #000000; border: none; 
            padding: 12px; cursor: pointer; text-transform: uppercase; font-family: monospace; 
            font-weight: bold; letter-spacing: 1px; transition: 0.3s;
        }
        .buy-btn:hover { background-color: #ccc; }

        .archive-counter { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .cart-link { background: #111; color: #fff; border: 1px solid #333; padding: 10px 20px; text-decoration: none; font-size: 11px; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a href="/" class="nav-btn">ГЛАВНАЯ</a>
    <!-- Используем наши новые динамические роуты -->
    <a href="/shop/prototypes" class="nav-btn">PROTOTYPES</a>
    <a href="/shop/nine" class="nav-btn">NUMBER (N)INE</a>
    <a href="/shop/rick" class="nav-btn">RICK OWENS</a>
</nav>

<div class="archive-counter">
    <a href="/cart" class="cart-link">
        АРХИВ ЗАКАЗА [<span id="cart-count">0</span>]
    </a>
</div>

<div class="stack">
    {{range .Items}}
    <div class="case-item">
        <div class="image-container">
            <img src="/img/{{.Image}}" alt="{{.Brand}}">
        </div>

        <p class="item-name">{{.Brand}} {{.Model}}</p>
        <p class="item-price">{{.Price}} ₽</p>
        
        <a href="/product/{{.ID}}" style="width: 100%;">
            <button class="buy-btn">КУПИТЬ</button>
        </a>
    </div>
    {{else}}
    <p style="color: #444; margin-top: 100px;">[ SYSTEM ]: В ДАННОМ РАЗДЕЛЕ НЕТ ОБЪЕКТОВ...</p>
    {{end}}
</div>

</body>
</html>
