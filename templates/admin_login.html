<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            border: 1px solid #333;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            background: #0a0a0a;
        }

        h1 {
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 30px;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 12px;
            color: #999;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            font-family: monospace;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #666;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #000;
            border: none;
            font-family: monospace;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            letter-spacing: 1px;
        }

        button:hover {
            background: #ccc;
        }

        .error {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 20px;
            font-size: 12px;
            text-transform: uppercase;
            border: 1px solid #ff6b6b;
            padding: 10px;
        }

        .nav {
            text-align: center;
            margin-top: 20px;
        }

        a {
            color: #999;
            text-decoration: none;
            font-size: 12px;
        }

        a:hover {
            color: #fff;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h1>[ ADMIN ACCESS ]</h1>

    {{ if .error }}
        <div class="error">{{ .error }}</div>
    {{ end }}

    <form method="POST" action="/admin/login">
        <div class="form-group">
            <label>Пароль / Password:</label>
            <input type="password" name="password" required placeholder="••••••••" autofocus>
        </div>

        <button type="submit">ВОЙТИ</button>
    </form>

    <div class="nav">
        <a href="/">← На главную</a>
    </div>
</div>

</body>
</html>
